<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ora Wordl.io</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell { transition: all 0.2s; border-width: 2px; }
        .correct    { background-color: #059669 !important; border-color: #059669 !important; color: white; }
        .present    { background-color: #ca8a04 !important; border-color: #ca8a04 !important; color: white; }
        .wrong-word { background-color: #7c3aed !important; border-color: #7c3aed !important; color: white; }
        .absent     { background-color: #1e293b !important; border-color: #1e293b !important; color: #475569 !important; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .pop { animation: pop 0.1s ease-in-out; }

        .row-flex   { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 6px; }
        .word-group { display: flex; gap: 6px; }
        .word-separator { width: 14px; flex-shrink: 0; }

        #generatorModal { backdrop-filter: blur(6px); }
        #generatorModal .inner {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            border: 2px solid #334155;
            box-shadow: 0 0 60px rgba(5,150,105,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        #wordInput { caret-color: #10b981; letter-spacing: 0.08em; }
        #wordInput:focus { box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
        #generatedLink { word-break: break-all; font-family: 'Courier New', monospace; font-size: 0.75rem; }
        .copy-btn { transition: all 0.15s; }
        .copy-btn:active { transform: scale(0.95); }
        #openGeneratorBtn {
            background: linear-gradient(135deg, #064e3b, #065f46);
            border: 1.5px solid #059669;
            box-shadow: 0 0 14px rgba(5,150,105,0.25);
            transition: all 0.2s;
        }
        #openGeneratorBtn:hover { box-shadow: 0 0 22px rgba(5,150,105,0.45); background: linear-gradient(135deg, #065f46, #047857); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center py-6 font-sans overflow-x-hidden">

    <div class="w-full max-w-4xl flex flex-col items-center px-4">
        <h1 class="text-3xl font-black mb-6 text-emerald-500 italic uppercase tracking-tighter">Ora Wordl.io</h1>

        <div class="mb-8">
            <button id="openGeneratorBtn" onclick="openGenerator()"
                    class="rounded-xl px-6 py-3 font-bold text-emerald-300 text-sm uppercase tracking-wider whitespace-nowrap">
                ✦ Genera Sfida
            </button>
        </div>

        <!-- Legenda colori (visibile solo se ci sono più parole) -->
        <div id="legend" class="hidden flex-wrap justify-center gap-4 mb-6 text-xs font-semibold text-slate-400">
            <span class="flex items-center gap-1.5"><span class="inline-block w-4 h-4 rounded bg-emerald-600"></span> Lettera nella posizione giusta</span>
            <span class="flex items-center gap-1.5"><span class="inline-block w-4 h-4 rounded bg-yellow-600"></span> Lettera in questa parola, posizione sbagliata</span>
            <span class="flex items-center gap-1.5"><span class="inline-block w-4 h-4 rounded bg-violet-600"></span> Lettera in un'altra parola</span>
            <span class="flex items-center gap-1.5"><span class="inline-block w-4 h-4 rounded bg-slate-800"></span> Lettera assente</span>
        </div>

        <div id="grid" class="grid gap-2 mb-8 justify-center"></div>
        <div id="keyboard" class="w-full max-w-2xl flex flex-col gap-1.5 mt-auto pb-4"></div>
    </div>

    <!-- Modale vittoria -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
        <div class="bg-slate-900 p-8 rounded-3xl text-center border-2 border-emerald-500 shadow-2xl max-w-xs w-full">
            <h2 class="text-3xl font-black mb-2 text-emerald-400 uppercase">Ottimo!</h2>
            <p id="stats" class="text-slate-300 mb-6 font-bold"></p>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="w-full bg-emerald-500 py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-emerald-600 transition">OK</button>
        </div>
    </div>

    <!-- Modale generatore -->
    <div id="generatorModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="inner rounded-3xl p-8 max-w-sm w-full relative">
            <button onclick="closeGenerator()" class="absolute top-4 right-4 text-slate-500 hover:text-slate-300 text-2xl leading-none font-bold transition">×</button>
            <h2 class="text-xl font-black text-emerald-400 uppercase tracking-widest mb-1">Genera Sfida</h2>
            <p class="text-slate-400 text-sm mb-6">Scegli una o più parole (separate da spazio) e condividi il link con i tuoi studenti.</p>
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Parola / Frase</label>
            <input id="wordInput" type="text"
                   placeholder="Es. Ciao bello"
                   oninput="onWordInput()"
                   class="w-full bg-slate-950 border-2 border-slate-700 focus:border-emerald-500 rounded-xl px-4 py-3 outline-none text-white text-xl text-center uppercase font-bold tracking-widest transition-all mb-5">
            <div id="linkPreviewBox" class="hidden mb-5">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Link generato</label>
                <div class="bg-slate-950 border border-slate-700 rounded-xl p-3 flex items-start gap-2">
                    <span id="generatedLink" class="text-emerald-400 flex-1 select-all"></span>
                    <button onclick="copyLink()" class="copy-btn flex-shrink-0 bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition" id="copyBtn">Copia</button>
                </div>
            </div>
            <button onclick="generateLink()"
                    class="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 py-4 rounded-xl font-black uppercase tracking-widest text-white transition-all duration-150 shadow-lg">
                Genera Link →
            </button>
        </div>
    </div>

    <script>
        /* ── Utility ── */
        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        }
        function b64EncodeUnicode(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode('0x' + p1)));
        }

        /* ── Generator popup ── */
        function openGenerator() { document.getElementById('generatorModal').classList.remove('hidden'); setTimeout(() => document.getElementById('wordInput').focus(), 50); }
        function closeGenerator() { document.getElementById('generatorModal').classList.add('hidden'); }
        function onWordInput() { document.getElementById('linkPreviewBox').classList.add('hidden'); }
        function generateLink() {
            const raw = document.getElementById('wordInput').value.trim().toUpperCase();
            if (!raw) {
                const inp = document.getElementById('wordInput');
                inp.classList.add('border-red-500'); inp.placeholder = 'Inserisci una parola!';
                setTimeout(() => { inp.classList.remove('border-red-500'); inp.placeholder = 'Es. SCUOLA'; }, 1500);
                return;
            }
            const encoded = b64EncodeUnicode(raw);
            const link = `https://aleborgi.github.io/orawordlio/?challenge=${encoded}`;
            document.getElementById('generatedLink').textContent = link;
            document.getElementById('linkPreviewBox').classList.remove('hidden');
            document.getElementById('copyBtn').textContent = 'Copia';
        }
        function copyLink() {
            const link = document.getElementById('generatedLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✓ Copiato'; btn.classList.add('bg-emerald-600');
                setTimeout(() => { btn.textContent = 'Copia'; btn.classList.remove('bg-emerald-600'); }, 2000);
            });
        }
        document.getElementById('generatorModal').addEventListener('click', function(e) { if (e.target === this) closeGenerator(); });

        /* ── Game logic ── */
        const KEYBOARD_KEYS = [
            ['Q','W','E','R','T','Y','U','I','O','P','È','É'],
            ['A','S','D','F','G','H','J','K','L','Ò','À'],
            ['Z','X','C','V','B','N','M','Ì','Ù','⌫','INVIO'],
        ];

        function isValidBase64(str) {
            if (!str || str.length % 4 !== 0) return false;
            return /^[A-Za-z0-9+/]*={0,2}$/.test(str);
        }

        let word = "";
        try {
            const params = new URLSearchParams(window.location.search);
            const b64 = params.get('challenge');
            if (!b64) throw new Error('missing');
            if (!isValidBase64(b64)) throw new Error('invalid base64');
            word = b64DecodeUnicode(b64).toUpperCase().trim().replace(/\s+/g, ' ');
            if (!word || word.replace(/ /g,'').length < 2) throw new Error('empty word');
        } catch(e) { word = "ERRORE"; }

        /* ── Multi-word support ── */
        const spacePositions = new Set();
        for (let i = 0; i < word.length; i++) { if (word[i] === ' ') spacePositions.add(i); }
        const L = word.length;
        const letterCount = word.replace(/ /g, '').length;

        // wordGroups: array of arrays of tile-indices per word
        const wordGroups = [];
        let group = [];
        for (let i = 0; i < L; i++) {
            if (word[i] === ' ') { if (group.length) { wordGroups.push(group); group = []; } }
            else group.push(i);
        }
        if (group.length) wordGroups.push(group);

        // Mostra legenda solo se ci sono più parole
        if (wordGroups.length > 1) {
            document.getElementById('legend').classList.remove('hidden');
            document.getElementById('legend').classList.add('flex');
        }

        // Per ogni tile-index, a quale wordGroup (indice) appartiene?
        const tileToWordGroup = {};
        wordGroups.forEach((grp, gi) => grp.forEach(ti => { tileToWordGroup[ti] = gi; }));

        let currentAttempt = 0;
        let guesses = Array(6).fill(null).map(() => Array(L).fill(''));
        let gameOver = false;
        const keyStates = {}; // 'correct' > 'present' > 'wrong-word' > 'absent'

        /* ── Build grid ── */
        const grid = document.getElementById('grid');
        const totalCols = L - spacePositions.size;
        const cellSize = totalCols > 9 ? 'w-8 h-10 sm:w-10 sm:h-12 text-lg' : 'w-12 h-12 sm:w-14 sm:h-14 text-2xl';

        for (let r = 0; r < 6; r++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row-flex';
            wordGroups.forEach((grp, gi) => {
                const wDiv = document.createElement('div');
                wDiv.className = 'word-group';
                grp.forEach(ci => {
                    const div = document.createElement('div');
                    div.id = `tile-${r}-${ci}`;
                    div.className = `${cellSize} border-2 border-slate-800 flex items-center justify-center font-bold uppercase cell rounded-lg bg-slate-900/50`;
                    wDiv.appendChild(div);
                });
                rowDiv.appendChild(wDiv);
                if (gi < wordGroups.length - 1) {
                    const sep = document.createElement('div'); sep.className = 'word-separator'; rowDiv.appendChild(sep);
                }
            });
            grid.appendChild(rowDiv);
        }

        /* ── Keyboard ── */
        const kb = document.getElementById('keyboard');
        KEYBOARD_KEYS.forEach(row => {
            const rowDiv = document.createElement('div'); rowDiv.className = "flex justify-center gap-1";
            row.forEach(key => {
                const btn = document.createElement('button');
                btn.innerText = key; btn.id = 'key-' + key;
                btn.className = `h-14 rounded-lg font-bold select-none transition-all duration-500 ${key.length > 1 ? 'bg-slate-600 px-4 text-[10px]' : 'bg-slate-800 flex-1'}`;
                btn.onclick = (e) => { e.preventDefault(); handleKey(key); };
                rowDiv.appendChild(btn);
            });
            kb.appendChild(rowDiv);
        });

        function typedCount() { return guesses[currentAttempt].filter((c,i) => !spacePositions.has(i) && c !== '').length; }
        function nextLetterIdx() { for (let i = 0; i < L; i++) { if (!spacePositions.has(i) && guesses[currentAttempt][i] === '') return i; } return -1; }
        function lastFilledLetterIdx() { for (let i = L - 1; i >= 0; i--) { if (!spacePositions.has(i) && guesses[currentAttempt][i] !== '') return i; } return -1; }

        function handleKey(key) {
            if (gameOver) return;

            if (key === '⌫') {
                const li = lastFilledLetterIdx(); if (li !== -1) guesses[currentAttempt][li] = '';
            } else if (key === 'INVIO') {
                if (typedCount() === letterCount) checkRow();
            } else if (key.length === 1) {
                if (typedCount() < letterCount) {
                    const ni = nextLetterIdx();
                    if (ni !== -1) {
                        guesses[currentAttempt][ni] = key;
                        for (let i = ni + 1; i < L; i++) {
                            if (spacePositions.has(i)) guesses[currentAttempt][i] = ' ';
                            else break;
                        }
                    }
                }
            }
            updateVisuals();
        }

        function updateVisuals() {
            for (let ci = 0; ci < L; ci++) {
                if (spacePositions.has(ci)) continue;
                const tile = document.getElementById(`tile-${currentAttempt}-${ci}`);
                if (!tile) continue;
                tile.innerText = guesses[currentAttempt][ci] || "";
                if (tile.innerText) tile.classList.add('pop'); else tile.classList.remove('pop');
            }
        }

        /* ── Priority order for keyStates ── */
        const statusPriority = { 'correct': 4, 'present': 3, 'wrong-word': 2, 'absent': 1 };
        function upgradeKey(letter, newStatus) {
            const cur = keyStates[letter];
            if (!cur || statusPriority[newStatus] > statusPriority[cur]) keyStates[letter] = newStatus;
        }

        function updateKeyboardUI() {
            for (const [letter, status] of Object.entries(keyStates)) {
                const btn = document.getElementById('key-' + letter);
                if (!btn) continue;
                if (status === 'correct') {
                    btn.style.backgroundColor = '#059669'; btn.style.color = 'white'; btn.style.opacity = '1';
                } else if (status === 'present') {
                    btn.style.backgroundColor = '#ca8a04'; btn.style.color = 'white'; btn.style.opacity = '1';
                } else if (status === 'wrong-word') {
                    btn.style.backgroundColor = '#7c3aed'; btn.style.color = 'white'; btn.style.opacity = '1';
                } else if (status === 'absent') {
                    btn.style.backgroundColor = '#0f172a'; btn.style.color = '#475569'; btn.style.opacity = '0.5';
                }
            }
        }

        function checkRow() {
            const guessArr = guesses[currentAttempt];
            const letterIndices = []; // tile-indices of non-space positions, in order
            for (let i = 0; i < L; i++) { if (!spacePositions.has(i)) letterIndices.push(i); }

            // Per ogni word-group, prepariamo le lettere della parola target e le lettere indovinate
            // status[tileIndex] = 'correct' | 'present' | 'wrong-word' | 'absent'
            const status = {};

            wordGroups.forEach((grp, gi) => {
                const targetLetters = grp.map(ti => word[ti]);       // lettere corrette di questa parola
                const guessedLetters = grp.map(ti => guessArr[ti]);  // lettere inserite in questa parola

                const remaining = [...targetLetters]; // copia per tracking

                // Primo passaggio: posizioni corrette
                grp.forEach((ti, pos) => {
                    if (guessedLetters[pos] === targetLetters[pos]) {
                        status[ti] = 'correct';
                        remaining[pos] = null;
                    }
                });

                // Secondo passaggio: present / absent (nella stessa parola)
                grp.forEach((ti, pos) => {
                    if (status[ti] === 'correct') return;
                    const g = guessedLetters[pos];
                    const idx = remaining.indexOf(g);
                    if (idx !== -1) {
                        status[ti] = 'present'; // nella stessa parola, posizione sbagliata
                        remaining[idx] = null;
                    }
                    // Se non trovata nella propria parola, verrà marcata dopo
                });
            });

            // Terzo passaggio: per le celle ancora senza status,
            // controlla se la lettera esiste in UN'ALTRA parola → 'wrong-word', altrimenti 'absent'
            const allWordLetters = Array.from(word).filter((c,i) => !spacePositions.has(i)); // tutte le lettere della frase

            letterIndices.forEach(ti => {
                if (status[ti]) return; // già assegnato (correct o present)
                const g = guessArr[ti];
                const myGroup = tileToWordGroup[ti];

                // La lettera esiste in qualche altra parola del target?
                let inOtherWord = false;
                wordGroups.forEach((grp, gi) => {
                    if (gi === myGroup) return;
                    if (grp.some(idx => word[idx] === g)) inOtherWord = true;
                });

                status[ti] = inOtherWord ? 'wrong-word' : 'absent';
            });

            // Aggiorna tastiera
            letterIndices.forEach(ti => {
                const g = guessArr[ti];
                upgradeKey(g, status[ti]);
            });

            // Anima tiles
            letterIndices.forEach((ti, order) => {
                const tile = document.getElementById(`tile-${currentAttempt}-${ti}`);
                setTimeout(() => {
                    tile.classList.add(status[ti]);
                    if (order === letterIndices.length - 1) updateKeyboardUI();
                }, order * 100);
            });

            // Check vittoria
            const wordLetters = Array.from(word).filter((c,i) => !spacePositions.has(i));
            const guessLetters = letterIndices.map(ti => guessArr[ti]);
            const won = guessLetters.every((g, j) => g === wordLetters[j]);

            if (won) {
                gameOver = true;
                setTimeout(() => {
                    document.getElementById('modal').classList.remove('hidden');
                    document.getElementById('stats').innerText = `Hai indovinato in ${currentAttempt + 1} tentativi!`;
                }, letterIndices.length * 100 + 400);
            } else if (++currentAttempt === 6) {
                gameOver = true;
                alert("Risposta corretta: " + word);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.id === 'wordInput') return;
            const k = e.key.toUpperCase();
            if (k === 'ENTER') handleKey('INVIO');
            else if (k === 'BACKSPACE') handleKey('⌫');
            else if (/^[A-ZÀÈÉÌÒÙ]$/.test(k)) handleKey(k);
        });

        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeGenerator(); });
    </script>
</body>
</html>
